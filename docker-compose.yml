services:
  weight-stats-be:
    image: ghcr.io/blingusblongus/weight-stats-be:latest
    container_name: weight-stats-be
    environment:
      - PORT=8083
      - DB_PATH=/data/weight-stats.db
      - WATCH_DIR=/watch
      - NTFY_TOPIC=https://ntfy.blingusblongus.com/weight
      - GIN_MODE=release
    volumes:
      - ${HOME}/weight-stats/data:/data
      - ${HOME}/sync/weight-stats:/watch:ro
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  weight-stats-fe:
    image: ghcr.io/blingusblongus/weight-stats-fe:latest
    container_name: weight-stats-fe
    ports:
      - "8087:80"
    depends_on:
      - weight-stats-be
    volumes:
      - ${HOME}/weight-stats/.htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
